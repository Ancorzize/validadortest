<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Histórico de Reportes</title>

  <style>
    :root {
      --bg-color: #0f1117;
      --bg-light: #181b22;
      --bg-sidebar: #1c1f26;

      --text-primary: #e4e7ef;
      --text-secondary: #9ca3b5;

      --accent: #00b4ff;
      --accent-hover: #0093d6;
      --danger: #e53939;
    }

    body {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: var(--bg-color);
      color: var(--text-primary);
    }

    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid #2c3340;
      padding: 18px;
      overflow-y: auto;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }

    button {
      padding: 10px 20px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background-color: var(--accent);
      color: white;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-bottom: 10px;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    .content {
      flex: 1;
      padding: 20px;
      background: var(--bg-light);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin-bottom: 12px;
    }

    .file-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 15px;
      transition: 0.2s;
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #2c3340;
      border-radius: 6px;
    }

    .file-link:hover {
      background: #263142;
      color: var(--accent-hover);
    }

    .empty {
      margin-top: 10px;
      color: var(--text-secondary);
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Histórico</h2>

    <button onclick="window.location.href='/'">⬅ Volver</button>
  </div>

  <div class="content">
    <ul>
      {{links}}
    </ul>
  </div>

</body>
</html>
